name: Scrape & Build i-Learning Dashboard

# Tự động chạy 3 lần/ngày theo giờ Việt Nam (UTC+7): ~06:00, ~12:00, ~18:00
# Lệch phút (không phải phút 0) để né giờ cao điểm GitHub Actions, tránh bị
# trễ/bỏ lịch — cùng nguyên tắc với dashboard Attendance.
# = 23:13 (hôm trước), 05:27, 11:42 giờ UTC.
# Cũng có thể chạy tay từ tab "Actions" trên GitHub (nút "Run workflow").
on:
  schedule:
    - cron: "13 23 * * *"  # ~06:13 giờ VN
    - cron: "27 5 * * *"   # ~12:27 giờ VN
    - cron: "42 11 * * *"  # ~18:42 giờ VN
  workflow_dispatch: {}     # cho phép bấm chạy tay để test

permissions:
  contents: write
  actions: write   # cần để workflow có thể tự kích hoạt lại chính nó (resume vòng quét dang dở)

# Nếu job trước còn đang chạy (VD do resume checkpoint) thì job mới không chạy
# chồng lên, tránh 2 job cùng ghi vào data/raw_scores.json.
concurrency:
  group: ilearning-scrape
  cancel-in-progress: false

jobs:
  scrape-and-build:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Cài Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Cài Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cài dependency Node + Playwright browser
        run: |
          npm install
          npx playwright install --with-deps chromium

      - name: Cấu hình Git identity (để scrape.js tự commit checkpoint được)
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Chạy scrape.js (đăng nhập LMS + lấy dữ liệu)
        env:
          LMS_LOGIN_ID: ${{ secrets.LMS_LOGIN_ID }}
          LMS_LOGIN_PASSWORD: ${{ secrets.LMS_LOGIN_PASSWORD }}
        run: node scripts/scrape.js

      - name: Build dashboard (build.py)
        run: python3 scripts/build.py

      - name: Commit và push kết quả
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/raw_scores.json data/run_log.json data/scrape_state.json data/class_calendar.json dashboard.html
          git diff --staged --quiet && echo "Không có thay đổi để commit" || git commit -m "Auto update: $(date -u +'%Y-%m-%d %H:%M UTC')"

          # Nếu remote đã có commit mới hơn (VD job tự-kích-hoạt trước đó vừa
          # push xong) thì push thẳng sẽ bị từ chối. Tự động pull --rebase rồi
          # thử lại vài lần thay vì để lỗi bắt phải chạy lại tay.
          for i in 1 2 3 4 5; do
            if git push; then
              echo "Push thành công."
              break
            fi
            echo "Push bị từ chối (lần $i) — đang pull --rebase rồi thử lại..."
            git fetch origin main
            if ! git rebase origin/main; then
              echo "Rebase bị xung đột thật sự — dùng phương án an toàn: giữ nguyên" \
                   "dữ liệu vừa build (các file này tự sinh ra, không cần giữ lịch sử chi tiết)."
              git rebase --abort
              git reset --hard origin/main
              git add data/raw_scores.json data/run_log.json data/scrape_state.json data/class_calendar.json dashboard.html
              git diff --staged --quiet && echo "Không có gì khác để commit" || git commit -m "Auto update: $(date -u +'%Y-%m-%d %H:%M UTC')"
            fi
            if [ "$i" -eq 5 ]; then
              echo "Đã thử 5 lần vẫn không push được — dừng lại, cần kiểm tra thủ công."
              exit 1
            fi
          done

      - name: Tự kích hoạt chạy tiếp nếu vòng quét chưa xong
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [ -f data/scrape_state.json ]; then
            STATUS=$(python3 -c "import json; print(json.load(open('data/scrape_state.json')).get('status',''))")
            if [ "$STATUS" = "in_progress" ]; then
              echo "Vòng quét chưa xong (status=in_progress) -> tự kích hoạt chạy tiếp ngay, không chờ lịch."
              gh workflow run daily-update.yml --ref main
            else
              echo "Vòng quét đã xong (status=$STATUS) -> không cần chạy tiếp, chờ tới mốc giờ kế tiếp."
            fi
          else
            echo "Chưa có data/scrape_state.json -> bỏ qua."
          fi

      - name: Gửi email thông báo chạy THẤT BẠI
        if: failure()
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          username: ${{ secrets.MAIL_USERNAME }}
          password: ${{ secrets.MAIL_PASSWORD }}
          from: i-Learning Dashboard Bot
          to: ${{ secrets.MAIL_TO }}
          subject: "❌ i-Learning Dashboard chạy THẤT BẠI"
          body: |
            Workflow "Scrape & Build i-Learning Dashboard" vừa chạy bị lỗi, cần kiểm tra.

            Xem log chi tiết tại: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}

      - name: Upload state (checkpoint) nếu job bị lỗi giữa chừng (để debug)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: ilearning-checkpoint
          path: |
            data/scrape_state.json
            data/run_log.json
          if-no-files-found: ignore

      - name: Upload ảnh/HTML debug nếu đăng nhập LMS thất bại
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: ilearning-login-debug
          path: debug/
          if-no-files-found: ignore

      - name: Gửi email thông báo chạy thành công
        if: success()
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          username: ${{ secrets.MAIL_USERNAME }}
          password: ${{ secrets.MAIL_PASSWORD }}
          from: i-Learning Dashboard Bot
          to: ${{ secrets.MAIL_TO }}
          subject: "✅ i-Learning Dashboard đã cập nhật thành công"
          body: |
            Workflow "Scrape & Build i-Learning Dashboard" vừa chạy xong thành công.

            Xem dashboard tại: https://scotsenglish.github.io/ilearning-tra-cuu-diem/
            Chi tiết log: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
